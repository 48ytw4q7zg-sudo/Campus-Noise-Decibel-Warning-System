server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/noise_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.noise.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:campus-noise-warning-system-jwt-secret-key-2026}
  expiration: 7200

ccswitch:
  base-url: http://localhost:5000

logging:
  level:
    com.example.noise: debug
